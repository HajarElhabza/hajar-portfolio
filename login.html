<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hajar Elhabza</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-inner">
            <div class="logo">Hajar<span>.</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="education.html">Education</a></li>
                    <li><a href="skills.html">Skills</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                    <li><a href="login.html" class="active">Blog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Login Form -->
    <div class="form-page">
        <div class="form-container">
            <h2>Blog Login</h2>
            <p class="form-subtitle">Sign in to add a new blog entry</p>

            <form action="addEntry.html" method="post">

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        minlength="6"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>

            </form>

            <p style="text-align:center; margin-top:1.5rem; font-size:0.85rem; color: var(--grey-text);">
                <a href="index.html" style="color: var(--accent);">← Back to Home</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Hajar Elhabza &mdash; BSc Computer Science, Queen Mary University of London</p>
    </footer>

</body>
</html>

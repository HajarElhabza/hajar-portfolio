<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Blog Entry | Hajar Elhabza</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-inner">
            <div class="logo">Hajar<span>.</span></div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="education.html">Education</a></li>
                    <li><a href="skills.html">Skills</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                    <li><a href="login.html" class="active">Blog</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Add Entry Form -->
    <div class="form-page">
        <div class="form-container" style="max-width: 580px;">
            <h2>Add Blog Entry</h2>
            <p class="form-subtitle">Share your thoughts and experiences</p>

            <form action="#" method="post" id="blogForm">

                <div class="form-group">
                    <label for="title">Post Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        placeholder="Enter a title for your post"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="post">Blog Content</label>
                    <textarea
                        id="post"
                        name="post"
                        placeholder="Write your blog post here..."
                        required
                    ></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Post</button>
                    <button type="button" class="btn btn-clear" id="clearBtn">Clear</button>
                </div>

            </form>

            <p style="text-align:center; margin-top:1.5rem; font-size:0.85rem; color: var(--grey-text);">
                <a href="index.html" style="color: var(--accent);">← Back to Home</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Hajar Elhabza &mdash; BSc Computer Science, Queen Mary University of London</p>
    </footer>

    <script>
        document.getElementById('clearBtn').addEventListener('click', function () {
            var confirmed = confirm('Are you sure you want to clear all fields? This cannot be undone.');
            if (confirmed) {
                document.getElementById('title').value = '';
                document.getElementById('post').value = '';
            }
        });
    </script>

</body>
</html>
